<tui-doc-main>
    <ng-container ngProjectAs="tuiDocHeader">
        <div class="header-container">
            <app-version-manager/>
            <a
                tuiLink
                appearance="icon"
                class="github-link"
                href="https://github.com/hakimio/ngx-ui-tour"
                target="_blank"
            >
                <img class="github-icon" src="assets/github.svg" alt=""/>
                GitHub
            </a>
            <button
                appearance="secondary"
                aria-label="Switch between dark and light mode"
                size="s"
                tuiIconButton
                type="button"
                [iconStart]="icon()"
                [style.border-radius.%]="100"
                (click)="darkMode.set(!darkMode())"
            ></button>
        </div>
    </ng-container>
</tui-doc-main>
